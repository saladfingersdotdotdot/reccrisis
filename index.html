<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crisis Command | MUN Fantasy World</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; color: #f1f5f9; }
        #map { height: 70vh !important; width: 100%; border-radius: 0.75rem; background: #1e293b; z-index: 1; border: 1px solid #334155; }
        .log-entry { border-left: 3px solid #3b82f6; padding: 8px; margin-bottom: 8px; background: rgba(59, 130, 246, 0.1); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <nav class="bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-bold text-red-500 tracking-tight">CRISIS ENGINE</h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest">Global Live Sync</p>
        </div>
        <button onclick="toggleAdmin()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-xs font-bold transition">ADMIN LOGIN</button>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 p-6">
        <div class="lg:col-span-3 space-y-6">
            <div id="map"></div>
            
            <div class="bg-slate-800 rounded-xl border border-slate-700 p-4">
                <h3 class="text-xs font-black text-slate-500 uppercase mb-3 tracking-tighter">Live Intelligence Feed</h3>
                <div id="log-container" class="h-40 overflow-y-auto pr-2 space-y-2 font-mono text-sm">
                    </div>
            </div>
        </div>

        <aside class="space-y-6">
            <div id="admin-panel" class="hidden bg-slate-900 border-2 border-red-600/30 p-5 rounded-xl shadow-2xl space-y-4">
        <h2 class="text-red-500 font-bold uppercase text-sm border-b border-red-900/50 pb-2">Admin Command</h2>
        
        <button onclick="preparePin()" id="pin-btn" class="w-full bg-red-600 hover:bg-red-700 p-3 rounded font-bold text-xs transition">
            📍 DROP CRISIS PIN
        </button>
    
        <div class="pt-4 border-t border-slate-800">
            <label class="text-[10px] text-slate-500 uppercase font-bold">Manual Intelligence Broadcast</label>
            <textarea id="log-input" class="w-full bg-slate-800 border border-slate-700 rounded p-3 text-xs mt-2 h-24 outline-none" placeholder="Enter flash report..."></textarea>
            <button onclick="submitLog()" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded mt-2 text-xs font-bold transition">BROADCAST</button>
        </div>
    
        <div class="pt-4 border-t border-slate-800">
            <button onclick="initiateOutbreak()" class="w-full border border-orange-500 text-orange-500 hover:bg-orange-500/10 p-2 rounded text-xs transition">
                ☣️ CREATE OUTBREAK ZONE
            </button>
        </div>

    <div class="pt-4 border-t border-red-900/50">
        <button onclick="clearAll()" class="w-full bg-slate-800 border border-red-600 text-red-500 hover:bg-red-600 hover:text-white p-2 rounded text-[10px] font-bold transition">
            🗑️ WIPE ALL MAP DATA
        </button>
    </div>
</div>

            <div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700">
                <h3 class="text-blue-400 font-bold text-sm mb-2">Instructions</h3>
                <p class="text-xs text-slate-400 leading-relaxed">
                    Crisis markers and outbreak zones sync automatically across all screens. Admins can click the map to place markers after enabling "Drop Pin".
                </p>
            </div>
        </aside>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SB_URL = 'https://ifrchxfpviwpvahpovcl.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmcmNoeGZwdml3cHZhaHBvdmNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTAzMTEsImV4cCI6MjA4OTg2NjMxMX0.YlkPkC72mnyDGKVTlHC_wFAI4RGZZBVemykF31bor3Q';
        const sbClient = window.supabase.createClient(SB_URL, SB_KEY);

    // --- 2. GLOBALS ---
    let map;
    let isAdmin = false;
    let pinMode = false;
    let pins = {};
    let outbreaks = {};
    
    // --- 3. ADMIN FUNCTIONS ---
    
    function toggleAdmin() {
        const pass = prompt("Enter Command Passcode:");
        if (pass === "914yhafo1ua0128bf1928b3fkabjk") {
            isAdmin = true;
            document.getElementById('admin-panel').classList.remove('hidden');
            alert("Access Granted. Command mode active.");
        } else {
            alert("Access Denied.");
        }
    }
    
    function preparePin() {
        if (!isAdmin) return;
        pinMode = true;
        const btn = document.getElementById('pin-btn');
        btn.innerText = "READY: CLICK MAP";
        btn.classList.replace('bg-red-600', 'bg-orange-600');
    }
    
    async function submitLog() {
        const val = document.getElementById('log-input').value;
        if (!val) return;
        await sbClient.from('events').insert([{ type: 'news', title: 'Update', description: val }]);
        document.getElementById('log-input').value = '';
    }
    
    async function initiateOutbreak() {
    if (!isAdmin) return;
    const lat = prompt("Latitude:", 38);
    const lng = prompt("Longitude:", -97);
    const radius = prompt("Initial Radius in KM:", 100); // Ask for radius
    
    if (lat && lng) {
        const { data, error } = await sbClient.from('outbreaks').insert([{ 
            center_lat: parseFloat(lat), 
            center_lng: parseFloat(lng), 
            radius_km: parseInt(radius) 
        }]).select();
        
        if (data) {
            // Store the ID so the slider knows which one to grow
            window.currentOutbreakId = data[0].id; 
            document.getElementById('radius-control').classList.remove('hidden');
        }
    }
}
    
    async function clearAll() {
        if (!isAdmin) return;
        if (!confirm("Wipe ALL map data for every viewer? This cannot be undone.")) return;
        
        // Deletes all rows where ID is not 0 (effectively everything)
        await sbClient.from('events').delete().neq('id', 0);
        await sbClient.from('outbreaks').delete().neq('id', 0);
        
        alert("Database cleared. The map will refresh for all users.");
    }
    
    // --- 4. MAP & SYNC LOGIC ---
    
    function handleNewEvent(item) {
        if (item.type === 'pin' && !pins[item.id]) {
            const marker = L.marker([item.lat, item.lng]).addTo(map)
                .bindPopup(`<div class="text-slate-900"><b>${item.title}</b><br>${item.description}</div>`);
            pins[item.id] = marker;
        }
        
        const container = document.getElementById('log-container');
        const div = document.createElement('div');
        div.className = 'log-entry border-l-4 border-blue-500 bg-blue-500/10 p-2 mb-2 text-xs font-mono';
        div.innerHTML = `<span class="text-blue-400 font-bold">[INTEL]</span> ${item.description || item.title}`;
        container.prepend(div);
    }
    
    function handleOutbreak(item) {
        if (outbreaks[item.id]) {
            // Update existing radius if it changed
            outbreaks[item.id].setRadius(item.radius_km * 1000);
        } else {
            // Create new circle
            const circle = L.circle([item.center_lat, item.center_lng], {
                color: 'red',
                fillColor: '#f03',
                fillOpacity: 0.4,
                radius: item.radius_km * 1000
            }).addTo(map);
            outbreaks[item.id] = circle;
        }
    }
    
    function initMap() {
        map = L.map('map').setView([37.8, -96], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CartoDB'
        }).addTo(map);
    
        map.on('click', async (e) => {
            if (!isAdmin || !pinMode) return;
            const title = prompt("Crisis Title:");
            const desc = prompt("Crisis Description:");
            if (title) {
                await sbClient.from('events').insert([{ 
                    type: 'pin', lat: e.latlng.lat, lng: e.latlng.lng, title: title, description: desc 
                }]);
            }
            pinMode = false;
            const btn = document.getElementById('pin-btn');
            btn.innerText = "📍 DROP CRISIS PIN";
            btn.classList.replace('bg-orange-600', 'bg-red-600');
        });
    }
    
    async function syncData() {
        // Initial Load
        const { data: evs } = await sbClient.from('events').select('*').order('id', { ascending: true });
        if (evs) evs.forEach(handleNewEvent);
    
        const { data: outs } = await sbClient.from('outbreaks').select('*');
        if (outs) outs.forEach(handleOutbreak);
    
        // Real-time Subscriptions
        sbClient.channel('map-sync')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'events' }, p => handleNewEvent(p.new))
            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'events' }, () => location.reload())
            .on('postgres_changes', { event: '*', schema: 'public', table: 'outbreaks' }, p => {
                if (p.eventType === 'DELETE') location.reload();
                else handleOutbreak(p.new);
            })
            .subscribe();
        
        // Fix for Leaflet rendering issues
        setTimeout(() => map.invalidateSize(), 500);
    }
    
    // Start everything on load
    window.onload = () => {
        initMap();
        syncData();
    };
    </script>
</body>
</html>
